name: Export Secrets as Artifact

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
    - name: Write secrets to files
      env:
        DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        mkdir -p secrets_export
        echo "$DIST_CERT_BASE64" > secrets_export/DIST_CERT_BASE64.txt
        echo "$DIST_CERT_PASSWORD" > secrets_export/DIST_CERT_PASSWORD.txt
        echo "$KEYCHAIN_PASSWORD" > secrets_export/KEYCHAIN_PASSWORD.txt
    - name: Upload secrets artifact
      uses: actions/upload-artifact@v4
      with:
        name: secrets-export
        path: secrets_export/
        retention-days: 1
