name: Copy Secrets to ShokuninWatch-iOS

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
    - name: Copy secrets to target repo
      env:
        DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        echo "$DIST_CERT_BASE64" | gh secret set DIST_CERT_BASE64 -R snarfnet/ShokuninWatch-iOS
        echo "$DIST_CERT_PASSWORD" | gh secret set DIST_CERT_PASSWORD -R snarfnet/ShokuninWatch-iOS
        echo "$KEYCHAIN_PASSWORD" | gh secret set KEYCHAIN_PASSWORD -R snarfnet/ShokuninWatch-iOS
        echo "$ASC_API_KEY_CONTENT" | gh secret set ASC_API_KEY_CONTENT -R snarfnet/ShokuninWatch-iOS
        echo "All secrets copied!"
